<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali Scuba Admin - Popup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-100 text-slate-900">

    <div class="flex min-h-screen">

        <!-- 사이드바 (데스크톱) -->
        <aside class="hidden lg:flex flex-col w-64 flex-shrink-0 bg-white border-r border-slate-200 p-5">
            <div class="px-2 mb-8">
                <p class="text-xl font-extrabold tracking-tight text-cyan-700">
                    BALI <span class="text-slate-900">SCUBA</span>
                </p>
                <p class="text-xs text-slate-400 font-medium mt-0.5">Admin</p>
            </div>
            <nav id="sidebar-nav" class="flex flex-col gap-1.5"></nav>
            <div class="mt-auto pt-6 border-t border-slate-100">
                <p class="text-xs text-slate-400 mb-1">Signed in as</p>
                <p id="user-email" class="text-sm font-semibold text-slate-700 truncate mb-3">—</p>
                <button id="logout-btn" class="w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold transition-colors">
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- 메인 -->
        <div class="flex-1 min-w-0">

            <!-- 모바일 상단 바 -->
            <div class="lg:hidden bg-white border-b border-slate-200">
                <div class="flex items-center justify-between px-4 py-3">
                    <p class="text-lg font-extrabold text-cyan-700">BALI <span class="text-slate-900">SCUBA</span></p>
                    <button id="logout-btn-mobile" class="text-sm font-semibold text-slate-600">Sign Out</button>
                </div>
                <nav id="mobile-nav" class="flex gap-1 px-3 pb-2"></nav>
            </div>

            <main class="p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto">

                <section class="mb-6 sm:mb-8">
                    <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900">Popup Banner</h1>
                    <p class="text-sm text-slate-400 mt-1">Configure the promotional popup shown on the customer booking site.</p>
                </section>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">

                    <!-- 설정 폼 -->
                    <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 sm:p-6">
                        <h2 class="text-sm font-bold text-slate-700 mb-4">Settings</h2>

                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1" for="popup-title">Title</label>
                        <input id="popup-title" type="text" placeholder="e.g. Monsoon Season Sale"
                               class="w-full mb-4 px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40">

                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1" for="popup-image">Image URL</label>
                        <input id="popup-image" type="url" placeholder="https://…/banner.jpg"
                               class="w-full mb-4 px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40">

                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1" for="popup-message">Message</label>
                        <textarea id="popup-message" rows="5" placeholder="Popup body text…"
                                  class="w-full mb-4 px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40 resize-y"></textarea>

                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1" for="popup-start">Start date</label>
                                <input id="popup-start" type="date"
                                       class="w-full px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1" for="popup-end">End date</label>
                                <input id="popup-end" type="date"
                                       class="w-full px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40">
                            </div>
                        </div>

                        <label class="flex items-center gap-2 mb-5 cursor-pointer">
                            <input id="popup-enabled" type="checkbox" class="admin-checkbox">
                            <span class="text-sm font-semibold text-slate-700">Enabled (show on customer site)</span>
                        </label>

                        <button id="save-btn" class="btn-primary w-full py-2.5 rounded-xl text-white text-sm font-semibold">
                            Save
                        </button>

                        <p id="save-status" class="hidden text-xs mt-3 text-center"></p>
                    </section>

                    <!-- 실시간 미리보기 -->
                    <section>
                        <h2 class="text-sm font-bold text-slate-700 mb-4">Live Preview</h2>
                        <div class="glass-card rounded-2xl shadow-lg p-6 sm:p-8">
                            <div id="preview-disabled" class="hidden text-center text-sm text-slate-400 py-8">
                                Popup is currently <span class="font-semibold">disabled</span> — customers will not see it.
                            </div>
                            <div id="preview-card">
                                <img id="preview-image" src="" alt="Popup image"
                                     class="hidden w-full max-h-52 object-cover rounded-xl mb-4">
                                <h3 id="preview-title" class="text-xl font-extrabold text-slate-900 mb-2">Popup title</h3>
                                <p id="preview-message" class="text-sm text-slate-600 whitespace-pre-wrap">Your message will appear here.</p>
                                <p id="preview-dates" class="text-xs text-slate-400 mt-4"></p>
                            </div>
                        </div>
                    </section>

                </div>

            </main>
        </div>
    </div>

    <script type="module" src="scripts/popup.js"></script>
</body>
</html>

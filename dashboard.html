<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali Scuba Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-100 text-slate-900">

    <div class="flex min-h-screen">

        <!-- 사이드바 (데스크톱) -->
        <aside class="hidden lg:flex flex-col w-64 flex-shrink-0 bg-white border-r border-slate-200 p-5">
            <div class="px-2 mb-8">
                <p class="text-xl font-extrabold tracking-tight text-cyan-700">
                    BALI <span class="text-slate-900">SCUBA</span>
                </p>
                <p class="text-xs text-slate-400 font-medium mt-0.5">Admin</p>
            </div>
            <nav id="sidebar-nav" class="flex flex-col gap-1.5"></nav>
            <div class="mt-auto pt-6 border-t border-slate-100">
                <p class="text-xs text-slate-400 mb-1">Signed in as</p>
                <p id="user-email" class="text-sm font-semibold text-slate-700 truncate mb-3">—</p>
                <button id="logout-btn" class="w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold transition-colors">
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- 메인 -->
        <div class="flex-1 min-w-0">

            <!-- 모바일 상단 바 -->
            <div class="lg:hidden bg-white border-b border-slate-200">
                <div class="flex items-center justify-between px-4 py-3">
                    <p class="text-lg font-extrabold text-cyan-700">BALI <span class="text-slate-900">SCUBA</span></p>
                    <button id="logout-btn-mobile" class="text-sm font-semibold text-slate-600">Sign Out</button>
                </div>
                <nav id="mobile-nav" class="flex gap-1 px-3 pb-2"></nav>
            </div>

            <main class="p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto">

                <!-- 인사 배너 (아메드 항공샷 배경 + 그라디언트) -->
                <section class="relative overflow-hidden rounded-3xl mb-6 sm:mb-8 shadow-lg shadow-slate-900/10">
                    <div class="absolute inset-0 bg-photo" style="background-image: url('assets/images/trips/amed.png');"></div>
                    <div class="absolute inset-0 bg-gradient-to-r from-slate-900/85 via-slate-900/60 to-slate-900/30"></div>
                    <div class="relative z-10 px-6 py-8 sm:px-10 sm:py-12">
                        <h1 id="greeting-title" class="text-2xl sm:text-3xl font-extrabold text-white">Good morning</h1>
                        <p id="greeting-date" class="text-cyan-100/90 text-sm mt-1 font-medium">—</p>
                    </div>
                </section>

                <!-- 통계 카드 -->
                <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6 sm:mb-8">
                    <div class="card-hover bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Total Bookings</p>
                        <p id="stat-total" class="text-3xl font-extrabold text-slate-900">0</p>
                    </div>
                    <div class="card-hover bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Pending</p>
                        <p id="stat-pending" class="text-3xl font-extrabold text-orange-500">0</p>
                    </div>
                    <div class="card-hover bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Booked This Month</p>
                        <p id="stat-booked-month" class="text-3xl font-extrabold text-green-600">0</p>
                    </div>
                    <div class="card-hover bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Cancelled</p>
                        <p id="stat-cancelled" class="text-3xl font-extrabold text-red-500">0</p>
                    </div>
                </section>

                <!-- 차트 -->
                <section class="grid grid-cols-1 lg:grid-cols-5 gap-4 mb-6 sm:mb-8">
                    <div class="lg:col-span-3 bg-white rounded-2xl p-5 sm:p-6 border border-slate-200 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-700 mb-4">Bookings (last 6 months)</h2>
                        <div class="h-80"><canvas id="bar-chart"></canvas></div>
                    </div>
                    <div class="lg:col-span-2 bg-white rounded-2xl p-5 sm:p-6 border border-slate-200 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-700 mb-4">By Destination</h2>
                        <div class="relative h-80">
                            <canvas id="doughnut-chart"></canvas>
                            <div id="doughnut-empty" class="hidden absolute inset-0 flex items-center justify-center text-sm text-slate-400">
                                No bookings yet
                            </div>
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <script type="module" src="scripts/dashboard.js"></script>
</body>
</html>
